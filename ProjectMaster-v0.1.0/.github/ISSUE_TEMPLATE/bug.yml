name: Reliability bug
description: Report incorrect, misleading, unsafe, or unverifiable behavior
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Reproduction and evidence
      description: Include prompts, configuration, tool output, and logs with secrets removed.
    validations:
      required: true
