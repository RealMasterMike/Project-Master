name: Publish signed alpha update

on:
  push:
    tags:
      - "v*-alpha"

permissions:
  contents: read

concurrency:
  group: project-master-alpha-release
  cancel-in-progress: false

jobs:
  publish-windows:
    name: Verify, sign, and publish Windows alpha
    runs-on: windows-2025
    environment: alpha-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - name: Verify synchronized release version
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $cargoVersion = (Select-String -LiteralPath src-tauri/Cargo.toml -Pattern '^version = "([^"]+)"').Matches[0].Groups[1].Value
          $pythonVersion = (Select-String -LiteralPath ProjectMaster-v0.1.0/pyproject.toml -Pattern '^version = "([^"]+)"').Matches[0].Groups[1].Value
          $runtimeVersion = (Select-String -LiteralPath ProjectMaster-v0.1.0/src/project_master/__init__.py -Pattern '__version__ = "([^"]+)"').Matches[0].Groups[1].Value
          $versions = @($packageVersion, $tauriVersion, $cargoVersion, $pythonVersion, $runtimeVersion) | Select-Object -Unique
          if ($versions.Count -ne 1) {
            throw "Release versions are not synchronized: $($versions -join ', ')."
          }
          $expectedTag = "v$packageVersion-alpha"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Tag $env:GITHUB_REF_NAME does not match release version $packageVersion (expected $expectedTag)."
          }

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify backend
        working-directory: ProjectMaster-v0.1.0
        run: |
          python -m pip install ".[dev]"
          python -m ruff check .
          python -m pytest -q

      - name: Verify frontend
        run: |
          npm test
          npm run build
          npm audit --audit-level=high

      - name: Build and smoke-test packaged backend
        run: |
          npm run backend:sidecar
          npm run backend:sidecar:test

      - name: Verify native application
        shell: pwsh
        run: |
          cargo fmt --manifest-path .\src-tauri\Cargo.toml --all -- --check
          if ($LASTEXITCODE -ne 0) { throw "cargo fmt failed." }
          cargo clippy --manifest-path .\src-tauri\Cargo.toml --all-targets -- -D warnings
          if ($LASTEXITCODE -ne 0) { throw "cargo clippy failed." }
          cargo test --manifest-path .\src-tauri\Cargo.toml
          if ($LASTEXITCODE -ne 0) { throw "cargo test failed." }

      - name: Read versioned release notes
        id: release-notes
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $changelog = Get-Content CHANGELOG.md -Raw
          $pattern = "(?ms)^## $([regex]::Escape($version)) ALPHA.*?(?=^## |\z)"
          $match = [regex]::Match($changelog, $pattern)
          if (-not $match.Success) {
            throw "CHANGELOG.md does not contain versioned release notes for $version."
          }
          $body = $match.Value.Trim()
          if ($body -notmatch '(?m)^### Known issues$' -or $body -notmatch '(?m)^### Verification$') {
            throw "Release notes must include Known issues and Verification sections."
          }
          $delimiter = "RELEASE_NOTES_$([guid]::NewGuid().ToString('N'))"
          Add-Content $env:GITHUB_OUTPUT "body<<$delimiter"
          Add-Content $env:GITHUB_OUTPUT $body
          Add-Content $env:GITHUB_OUTPUT $delimiter

      - name: Build and upload signed draft artifacts
        id: tauri
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Project Master ALPHA v__VERSION__
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseDraft: true
          prerelease: true
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          uploadUpdaterSignatures: true

      - name: Generate and upload checksums
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $bundleRoot = Resolve-Path "src-tauri/target/release/bundle"
          $artifacts = Get-ChildItem $bundleRoot -Recurse -File |
            Where-Object { $_.Extension -in @('.exe', '.msi', '.sig') } |
            Sort-Object Name
          if (-not $artifacts) {
            throw "No release artifacts were found for checksum generation."
          }
          $checksumPath = Join-Path $env:RUNNER_TEMP "SHA256SUMS.txt"
          $lines = foreach ($artifact in $artifacts) {
            $hash = (Get-FileHash -Algorithm SHA256 $artifact.FullName).Hash.ToLowerInvariant()
            "$hash  $($artifact.Name)"
          }
          [IO.File]::WriteAllLines($checksumPath, $lines)
          gh release upload $env:GITHUB_REF_NAME `
            --repo $env:GITHUB_REPOSITORY `
            $checksumPath `
            --clobber
          if ($LASTEXITCODE -ne 0) { throw "Uploading release checksums failed." }

      - name: Publish verified alpha prerelease
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit $env:GITHUB_REF_NAME `
            --repo $env:GITHUB_REPOSITORY `
            --draft=false `
            --prerelease
          if ($LASTEXITCODE -ne 0) { throw "Publishing the verified alpha prerelease failed." }

      - name: Publish rolling alpha update metadata
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $channelDirectory = Join-Path $env:RUNNER_TEMP "project-master-alpha-channel"
          New-Item -ItemType Directory -Force $channelDirectory | Out-Null
          gh release download $env:GITHUB_REF_NAME `
            --repo $env:GITHUB_REPOSITORY `
            --pattern latest.json `
            --dir $channelDirectory
          if ($LASTEXITCODE -ne 0) { throw "Downloading latest.json failed." }

          gh release view updater-alpha --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create updater-alpha `
              --repo $env:GITHUB_REPOSITORY `
              --prerelease `
              --target $env:GITHUB_SHA `
              --title "Project Master Alpha Update Channel" `
              --notes "Machine-readable metadata for Project Master's signed alpha updater."
            if ($LASTEXITCODE -ne 0) { throw "Creating the rolling alpha update channel failed." }
          }

          gh release upload updater-alpha `
            --repo $env:GITHUB_REPOSITORY `
            "$channelDirectory\latest.json#latest.json" `
            --clobber
          if ($LASTEXITCODE -ne 0) { throw "Publishing rolling alpha metadata failed." }
